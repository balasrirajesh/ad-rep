name: graduway
description: GraduWay - Alumni-Student Guidance Platform for Aditya Engineering College
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # Animations
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  animated_text_kit: ^4.2.2

  # UI Components
  google_fonts: ^6.2.1
  device_preview: ^1.1.0
  smooth_page_indicator: ^1.1.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  percent_indicator: ^4.2.3
  fl_chart: ^0.67.0
  timeline_tile: ^2.0.0
  card_swiper: ^3.0.1

  # Icons & Assets
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.7.0

  # Utilities
  intl: ^0.20.0
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.3
  image_picker: ^1.1.2
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
