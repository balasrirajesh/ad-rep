<!DOCTYPE html>
<html>
<head>
    <title>Live WebRTC Class Demo</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #fff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: #1e1e1e; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .main { display: flex; flex: 1; padding: 20px; gap: 20px; }
        .video-container { flex: 2; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .video-box { background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 2px solid #333; height: 350px;}
        video { width: 100%; height: 100%; object-fit: cover; }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.8; }
        .label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; z-index: 10; }
        .side-panel { flex: 1; display: flex; flex-direction: column; background: #1e1e1e; border-radius: 12px; padding: 15px; border: 1px solid #333; }
        .logs { flex: 1; overflow-y: auto; background: #0a0a0a; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; border: 1px solid #222; }
    </style>
</head>
<body>
    <header>
        <h2 style="margin: 0; color: #2196f3;">Alumni Connect <span style="color: #666; font-weight: 300;">| Live Session</span></h2>
        <div id="statusInfo">Signaling: Connected</div>
    </header>
    <div class="main">
        <div class="video-container">
            <div class="video-box">
                <video id="localVideo" autoplay muted playsinline></video>
                <canvas id="localCanvas"></canvas>
                <div class="label" id="localLabel">Local Stream</div>
            </div>
            <div class="video-box">
                <video id="remoteVideo" autoplay playsinline></video>
                <canvas id="remoteCanvas"></canvas>
                <div class="label">Remote Stream (Waiting...)</div>
            </div>
        </div>
        <div class="side-panel">
            <div class="logs" id="logs"></div>
            <div style="margin-top: 15px; display: flex; gap: 10px;">
                <button onclick="startSession('MENTOR')" style="background:#2196f3; color:#fff; padding:10px; border:none; border-radius:5px; cursor:pointer;">Start as Alumni</button>
                <button onclick="startSession('STUDENT')" style="background:#4caf50; color:#fff; padding:10px; border:none; border-radius:5px; cursor:pointer;">Join as Student</button>
            </div>
        </div>
    </div>
    <script>
        const socket = io('http://localhost:3000');
        let localStream, pc;
        const roomId = 'live-class-room';

        function startAnimate(canvas, color) {
            const ctx = canvas.getContext('2d');
            let offset = 0;
            function run() {
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.beginPath(); ctx.strokeStyle = color; ctx.lineWidth = 4;
                for(let x=0;x<canvas.width;x++) {
                    const y = canvas.height/2 + Math.sin(x*0.05 + offset)*40;
                    if(x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                }
                ctx.stroke(); offset+=0.15; requestAnimationFrame(run);
            }
            run();
        }

        async function startSession(role) {
            document.getElementById('localLabel').textContent = "Local: " + role;
            startAnimate(document.getElementById('localCanvas'), role==='MENTOR' ? '#2196f3':'#4caf50');
            localStream = await navigator.mediaDevices.getUserMedia({video:true, audio:true});
            document.getElementById('localVideo').srcObject = localStream;
            socket.emit('join-room', roomId);
            if(role==='MENTOR') socket.on('user-joined', id => initiateCall(id));
        }

        async function initiateCall(id) {
            pc = createPC(id);
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit('offer', {offer, roomId});
        }

        socket.on('offer', async data => {
            pc = createPC(data.from);
            await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('answer', {answer, to: data.from});
        });

        socket.on('answer', data => pc.setRemoteDescription(new RTCSessionDescription(data.answer)));
        socket.on('ice-candidate', data => pc && pc.addIceCandidate(new RTCIceCandidate(data.candidate)));

        function createPC(id) {
            const p = new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});
            localStream.getTracks().forEach(t => p.addTrack(t, localStream));
            p.onicecandidate = e => e.candidate && socket.emit('ice-candidate', {candidate:e.candidate, roomId});
            p.ontrack = e => {
                document.getElementById('remoteVideo').srcObject = e.streams[0];
                startAnimate(document.getElementById('remoteCanvas'), '#fff');
            };
            return p;
        }
    </script>
</body>
</html>
