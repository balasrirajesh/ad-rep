<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Webinar Test Client</title>
    <script src="https://cdn.socket.io/4.8.3/socket.io.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .video-container { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        video { width: 400px; height: 300px; background: #222; border-radius: 8px; border: 2px solid #444; }
        .controls { margin-bottom: 20px; }
        input, button { padding: 10px; border-radius: 4px; border: none; margin: 5px; }
        button { background: #e91e63; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #c2185b; }
        #status { color: #aaa; margin-top: 10px; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>WebRTC Webinar Test Client</h1>
    <div class="controls">
        <input type="text" id="roomId" placeholder="Enter Room ID" value="test-room">
        <button id="joinBtn">Join Room</button>
        <button id="startBtn" disabled>Start Streaming (Host)</button>
    </div>
    <div id="status">Disconnected</div>
    
    <div class="video-container">
        <div>
            <h3>Local Stream</h3>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div>
            <h3>Remote Stream</h3>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <script src="test_client.js"></script>
</body>
</html>
